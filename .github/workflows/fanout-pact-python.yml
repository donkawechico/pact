name: Fan out to pact-python

on:
  push:
    branches: [main]
    paths:
      - SPEC.md
      - fixtures/config/**
      - fixtures/message/**
      - fixtures/crypto/**

  # Useful during POC setup so you can test dispatch plumbing
  # without needing a spec or fixture change.
  workflow_dispatch:

jobs:
  dispatch-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # Stage 1 note:
      # This workflow currently hardcodes the downstream target.
      # The metadata files under .github/pact-sync/ are present so
      # stage 2 can generalize this to multiple downstream repos.
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PACT_SYNC_APP_ID }}
          private-key: ${{ secrets.PACT_SYNC_APP_PRIVATE_KEY }}
          owner: donkawechico
          repositories: pact-python

      - name: Trigger pact-python sync workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api \
            repos/donkawechico/pact-python/actions/workflows/sync-from-pact.yml/dispatches \
            -f ref=main \
            -F inputs[pact_repo]=${{ github.repository }} \
            -F inputs[pact_sha]=${{ github.sha }}